name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/MacDeDup \
            target/x86_64-apple-darwin/release/MacDeDup \
            -output MacDeDup
          tar czf MacDeDup-${{ github.ref_name }}-macos-universal.tar.gz MacDeDup
          shasum -a 256 MacDeDup-${{ github.ref_name }}-macos-universal.tar.gz > MacDeDup-${{ github.ref_name }}-macos-universal.tar.gz.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MacDeDup-${{ github.ref_name }}-macos-universal.tar.gz
            MacDeDup-${{ github.ref_name }}-macos-universal.tar.gz.sha256
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/nateProjects/MacDeDup/releases/download/${TAG}/MacDeDup-${TAG}-macos-universal.tar.gz"
          SHA256=$(curl -sL "${URL}.sha256" | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nateProjects/homebrew-tap.git" tap
          cd tap

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/macdedup.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/macdedup.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/macdedup.rb
          git commit -m "Update macdedup to ${TAG}"
          git push
